<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lojinha</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <style>
        p {
            font-family: fantasy;
            
        }
        .parte1 {
            background-color:#d6107d;
            height: 100vh;
            display: flex;
            justify-content: center; /* horizontal */
            align-items: center;     /* vertical */
        }

        .parte2 {
            background-color: #d69d76; 
            padding: 180px;
            
        }

        .parte3 {
            background-color: #cd7c49;
            padding: 180px; 
            display: flex;  
            justify-content: right;
            align-items: center;  
        }
    </style>
</head>
<body>
    <div class="parte1">
        <img src="logo.jpeg" alt="logo">
    </div>

    <div class="parte2">
        <img src="vestido300.jpeg" alt="vestido 1">
        <p style="text-align: center; font-size: 45px ">R$400,00</p>    
    </div>

    <div class="parte3">
        <img src="vestido2-400.jpeg" alt="vestido 2" style="display: flex;justify-content: right;align-items: center; " >
        <p style="text-align: left; font-size: 45px">R$300,00</p>
    </div>

    <div class="4">

    </div>

    <div class="5">

    </div>
</body>
</html>
